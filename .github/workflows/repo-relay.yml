name: Repo Relay

on:
  pull_request:
    types: [opened, closed, reopened, synchronize, edited, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ['CI']
    types: [completed]
  issue_comment:
    types: [created]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published]

# Serialize runs — concurrent jobs would race on the state cache
concurrency:
  group: repo-relay-${{ github.repository }}

jobs:
  notify:
    runs-on: ubuntu-latest
    # Skip bots, fork PRs (no secrets), and workflow_runs with no associated PRs
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event.pull_request.head.repo.full_name == github.repository ||
       github.event.pull_request == null) &&
      (github.event_name != 'workflow_run' ||
       github.event.workflow_run.pull_requests[0] != null)
    steps:
      # Persist SQLite state between runs. Per-run key: cache entries are
      # immutable, so a constant key would freeze state at the first run.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.repo-relay
          key: repo-relay-state-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            repo-relay-state-${{ github.repository }}-

      - uses: blamechris/repo-relay@f08840b9c336b50f6aef8d6e157d8f7e705fa875 # v1.1.0
        with:
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          channel_prs: ${{ secrets.DISCORD_CHANNEL_PRS }}
          channel_issues: ${{ secrets.DISCORD_CHANNEL_ISSUES || secrets.DISCORD_CHANNEL_PRS }}
          channel_releases: ${{ secrets.DISCORD_CHANNEL_RELEASES || secrets.DISCORD_CHANNEL_PRS }}
