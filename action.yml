name: 'Repo Relay'
description: 'GitHub-Discord integration bot that tracks PRs, CI, issues, releases, and deployments with threaded updates'
author: 'Christopher Pishaki'

branding:
  icon: 'message-circle'
  color: 'purple'

inputs:
  discord_bot_token:
    description: 'Discord bot token'
    required: true
  channel_prs:
    description: 'Discord channel ID for PR notifications'
    required: true
  channel_issues:
    description: 'Discord channel ID for issue notifications (defaults to channel_prs)'
    required: false
  channel_releases:
    description: 'Discord channel ID for release notifications (defaults to channel_prs)'
    required: false
  channel_deployments:
    description: 'Discord channel ID for deployment notifications (defaults to channel_prs)'
    required: false
  channel_security:
    description: 'Discord channel ID for security alert notifications (defaults to channel_prs)'
    required: false
  state_dir:
    description: 'Directory for SQLite state persistence (default: ~/.repo-relay)'
    required: false
    default: '~/.repo-relay'
  github_token:
    description: 'GitHub token for API access (review detection). Defaults to github.token'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev

    - name: Validate inputs
      shell: bash
      # Inputs are passed via env and referenced as shell variables — never
      # interpolated with ${{ }} into the script text, which would let a value
      # containing shell metacharacters execute (classic Actions injection).
      env:
        DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
        CHANNEL_PRS: ${{ inputs.channel_prs }}
      run: |
        if [ -z "$DISCORD_BOT_TOKEN" ]; then
          echo "::error::discord_bot_token is required but was not provided"
          exit 1
        fi
        if [ -z "$CHANNEL_PRS" ]; then
          echo "::error::channel_prs is required but was not provided"
          exit 1
        fi
        if ! [[ "$CHANNEL_PRS" =~ ^[0-9]+$ ]]; then
          echo "::error::channel_prs must be a numeric Discord channel ID, got: $CHANNEL_PRS"
          exit 1
        fi
        echo "Inputs validated successfully"

    - name: Run repo-relay
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
        DISCORD_CHANNEL_PRS: ${{ inputs.channel_prs }}
        DISCORD_CHANNEL_ISSUES: ${{ inputs.channel_issues }}
        DISCORD_CHANNEL_RELEASES: ${{ inputs.channel_releases }}
        DISCORD_CHANNEL_DEPLOYMENTS: ${{ inputs.channel_deployments }}
        DISCORD_CHANNEL_SECURITY: ${{ inputs.channel_security }}
        GITHUB_TOKEN: ${{ inputs.github_token || github.token }}
        STATE_DIR: ${{ inputs.state_dir }}
      run: node dist/cli.js
